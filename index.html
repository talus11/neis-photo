<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나이스 사진 일괄 변환기</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --apple-bg: #F5F5F7;
            --apple-card-bg: #FFFFFF;
            --apple-text: #1D1D1F;
            --apple-text-muted: #86868B;
            --apple-blue: #0071E3;
            --apple-blue-hover: #0056A1;
            --apple-border: #C7C7CC;
            --apple-radius-lg: 18px;
            --apple-radius-md: 12px;
            --apple-radius-sm: 8px;
        }

        body { 
            background-color: var(--apple-bg); 
            color: var(--apple-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 50px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .apple-container { 
            max-width: 700px; 
            margin: 0 auto;
            background: var(--apple-card-bg); 
            padding: 40px; 
            border-radius: var(--apple-radius-lg); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        h2 { text-align: center; font-weight: 700; font-size: 2.2rem; margin-bottom: 5px; letter-spacing: -0.5px; }
        .info-subtitle { text-align: center; color: var(--apple-text-muted); font-size: 1rem; margin-bottom: 40px; }
        .step-label { font-weight: 600; font-size: 1.1rem; color: var(--apple-text); margin-bottom: 8px; display: block; }
        .step-desc { font-size: 0.9rem; color: var(--apple-text-muted); margin-top: -5px; margin-bottom: 15px; }

        textarea, .form-control { 
            width: 100%; border-radius: var(--apple-radius-sm); border: 1px solid var(--apple-border); 
            padding: 12px; font-size: 1rem; background-color: #FAFAFA; box-sizing: border-box; transition: all 0.2s ease;
        }
        textarea:focus, .form-control:focus {
            border-color: var(--apple-blue); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15); outline: none; background-color: #FFFFFF;
        }

        #drop-zone { 
            border: 1px dashed var(--apple-border); padding: 50px 30px; text-align: center; cursor: pointer; 
            border-radius: var(--apple-radius-md); margin-bottom: 30px; background-color: #FAFAFA; transition: all 0.2s ease;
        }
        #drop-zone:hover { border-color: var(--apple-blue); background-color: rgba(0, 113, 227, 0.02); }
        #drop-zone p { margin: 0; color: var(--apple-text-muted); font-size: 0.95rem; }
        #drop-zone strong { color: var(--apple-text); font-size: 1.1rem; display: block; margin-bottom: 5px;}

        .apple-btn-blue { 
            display: block; width: 100%; background-color: var(--apple-blue); color: white; border: none;
            border-radius: var(--apple-radius-md); padding: 16px; font-size: 1.1rem; font-weight: 600; 
            cursor: pointer; transition: background-color 0.2s ease, transform 0.1s ease;
        }
        .apple-btn-blue:hover { background-color: var(--apple-blue-hover); }
        .apple-btn-blue:active { transform: scale(0.98); }

        #status { margin-top: 20px; text-align: center; font-weight: 600; color: var(--apple-blue); min-height: 1.5rem; }
        .mb-30 { margin-bottom: 30px; }
        .d-none { display: none; }
        
        .nav-btn {
            display: inline-block; background-color: #E8E8ED; color: var(--apple-text); text-decoration: none;
            padding: 10px 20px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; margin-bottom: 20px; transition: background-color 0.2s;
        }
        .nav-btn:hover { background-color: #D1D1D6; }
        
        /* 만든 사람 크레딧 스타일 */
        .credit-footer {
            text-align: center; margin-top: 40px; margin-bottom: 10px; font-size: 0.85rem; color: #86868B; font-weight: 500;
        }
    </style>
</head>
<body>

<div class="apple-container">
    <a href="converter.html" class="nav-btn">📝 엑셀 명단 변환기 먼저 가기 →</a>

    <h2>📸 나이스 사진 일괄 변환기</h2>
    <p class="info-subtitle">200KB 용량 압축 + 파일명 자동 변경 (성명(번호))</p>
    
    <div class="mb-30">
        <label class="step-label">1단계. 학생 명단 입력</label>
        <p class="step-desc">나이스 학급명단을 한 줄에 한 명씩 붙여넣으세요. (파일명이 됩니다)</p>
        <textarea id="nameList" rows="6" placeholder="예)&#10;홍길동(1)&#10;이순신(2)"></textarea>
    </div>

    <div class="mb-30">
        <label class="step-label">2단계. 사진 파일 업로드</label>
        <p class="step-desc">위 명단 순서와 동일한 순서로 사진들을 한꺼번에 올리세요.</p>
        <div id="drop-zone">
            <strong>사진 파일 선택 또는 드래그</strong>
            <p id="file-count">아직 선택된 파일이 없습니다.</p>
            <input type="file" id="fileInput" multiple accept="image/*" class="d-none">
        </div>
    </div>

    <button id="processBtn" class="apple-btn-blue">변환 및 압축파일(.zip) 다운로드</button>
    
    <div id="status"></div>

    <div class="credit-footer">
        2026 배곧해솔중 지리교사 정희택
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const nameListInput = document.getElementById('nameList');
    const status = document.getElementById('status');
    const fileCountText = document.getElementById('file-count');

    dropZone.onclick = () => fileInput.click();
    
    fileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            fileCountText.innerText = `${e.target.files.length}개의 파일이 선택되었습니다.`;
            fileCountText.style.color = '#0071E3'; 
        } else {
            fileCountText.innerText = "아직 선택된 파일이 없습니다.";
            fileCountText.style.color = '#86868B';
        }
    };

    processBtn.onclick = async () => {
        const files = fileInput.files;
        const names = nameListInput.value.split('\n').map(n => n.trim()).filter(n => n !== "");

        if (files.length === 0 || names.length === 0) {
            alert("명단 입력과 사진 선택을 모두 완료해주세요!");
            return;
        }

        if (files.length !== names.length) {
            alert(`명단 수(${names.length})와 사진 수(${files.length})가 일치하지 않습니다!`);
            return;
        }

        status.innerText = "처리 중... 잠시만 기다려주세요.";
        const zip = new JSZip();

        for (let i = 0; i < files.length; i++) {
            const blob = await compressAndResize(files[i]);
            zip.file(`${names[i]}.jpg`, blob);
        }

        const content = await zip.generateAsync({type: "blob"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = "nice_photos.zip";
        link.click();
        
        status.innerText = "✓ 변환 완료! 압축파일이 다운로드되었습니다.";
    };

    function compressAndResize(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 300; 
                    canvas.height = 400;
                    ctx.drawImage(img, 0, 0, 300, 400);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.85); 
                };
            };
        });
    }
</script>
</body>
</html>
