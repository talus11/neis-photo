<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나이스 사진 일괄 변환기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background-color: #f8f9fa; padding: 30px; }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #drop-zone { border: 2px dashed #0d6efd; padding: 40px; text-align: center; cursor: pointer; border-radius: 10px; margin-bottom: 20px; }
        .info-text { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">📸 나이스 사진 일괄 변환기</h2>
    <p class="text-center info-text">200KB 용량 압축 + 파일명 자동 변경(성명(번호))</p>
    
    <div class="mb-4">
        <label class="form-label"><strong>1. 학생 명단 입력</strong> (한 줄에 한 명씩, 예: 홍길동(1))</label>
        <textarea id="nameList" class="form-control" rows="5" placeholder="나이스에서 복사한 명단을 붙여넣으세요.&#10;홍길동(1)&#10;이순신(2)"></textarea>
    </div>

    <div id="drop-zone">
        <strong>2. 사진 파일 선택 또는 드래그</strong>
        <input type="file" id="fileInput" multiple accept="image/*" class="d-none">
        <p class="mt-2 text-muted">입력한 명단 순서와 업로드하는 사진 순서가 같아야 합니다.</p>
    </div>

    <button id="processBtn" class="btn btn-primary w-100 btn-lg">변환 및 압축파일 다운로드</button>
    
    <div id="status" class="mt-3 text-center fw-bold text-primary"></div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const nameListInput = document.getElementById('nameList');
    const status = document.getElementById('status');

    dropZone.onclick = () => fileInput.click();

    processBtn.onclick = async () => {
        const files = fileInput.files;
        const names = nameListInput.value.split('\n').map(n => n.trim()).filter(n => n !== "");

        if (files.length === 0 || names.length === 0) {
            alert("명단 입력과 사진 선택을 모두 완료해주세요!");
            return;
        }

        if (files.length !== names.length) {
            alert(`명단 수(${names.length})와 사진 수(${files.length})가 일치하지 않습니다!`);
            return;
        }

        status.innerText = "처리 중... 잠시만 기다려주세요.";
        const zip = new JSZip();

        for (let i = 0; i < files.length; i++) {
            const blob = await compressAndResize(files[i]);
            zip.file(`${names[i]}.jpg`, blob);
        }

        const content = await zip.generateAsync({type: "blob"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = "nice_photos.zip";
        link.click();
        
        status.innerText = "변환 완료! 압축파일이 다운로드되었습니다.";
    };

    function compressAndResize(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 나이스 권장 비율 (예: 3:4 비율로 고정)
                    canvas.width = 300;
                    canvas.height = 400;
                    ctx.drawImage(img, 0, 0, 300, 400);

                    // 0.8 퀄리티로 JPEG 압축 (200KB 이하로 충분히 들어감)
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.8);
                };
            };
        });
    }
</script>
</body>
</html>
