<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엑셀 명단 변환기</title>
    <style>
        /* --- 애플 감성 테마 설정 --- */
        :root {
            --apple-bg: #F5F5F7;
            --apple-card-bg: #FFFFFF;
            --apple-text: #1D1D1F;
            --apple-text-muted: #86868B;
            --apple-blue: #0071E3;
            --apple-blue-hover: #0056A1;
            --apple-border: #C7C7CC;
            --apple-radius-lg: 18px;
            --apple-radius-md: 12px;
            --apple-radius-sm: 8px;
        }

        body { 
            background-color: var(--apple-bg); 
            color: var(--apple-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 50px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .apple-container { 
            max-width: 700px; 
            margin: 0 auto;
            background: var(--apple-card-bg); 
            padding: 40px; 
            border-radius: var(--apple-radius-lg); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        h2 { text-align: center; font-weight: 700; font-size: 2.2rem; margin-bottom: 5px; letter-spacing: -0.5px; }
        .info-subtitle { text-align: center; color: var(--apple-text-muted); font-size: 1rem; margin-bottom: 30px; }
        .step-label { font-weight: 600; font-size: 1.1rem; margin-bottom: 8px; display: block; }
        
        /* 네비게이션 버튼 (사진 변환기로 이동) */
        .nav-btn {
            display: inline-block;
            background-color: #E8E8ED;
            color: var(--apple-text);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }
        .nav-btn:hover { background-color: #D1D1D6; }

        .input-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-box { flex: 1; }
        
        textarea { 
            width: 100%;
            border-radius: var(--apple-radius-sm); 
            border: 1px solid var(--apple-border); 
            padding: 12px;
            font-size: 1rem;
            background-color: #FAFAFA;
            box-sizing: border-box;
            resize: vertical;
            transition: all 0.2s ease;
        }
        textarea:focus {
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
            outline: none;
            background-color: #FFFFFF;
        }

        .apple-btn-blue { 
            display: block; width: 100%; background-color: var(--apple-blue); color: white; 
            border: none; border-radius: var(--apple-radius-md); padding: 16px; font-size: 1.1rem; 
            font-weight: 600; cursor: pointer; transition: all 0.2s ease; margin-bottom: 20px;
        }
        .apple-btn-blue:hover { background-color: var(--apple-blue-hover); }
        .apple-btn-blue:active { transform: scale(0.98); }

        .apple-btn-outline {
            display: block; width: 100%; background-color: transparent; color: var(--apple-blue); 
            border: 2px solid var(--apple-blue); border-radius: var(--apple-radius-md); 
            padding: 14px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .apple-btn-outline:hover { background-color: rgba(0, 113, 227, 0.05); }

    </style>
</head>
<body>

<div class="apple-container">
    <a href="index.html" class="nav-btn">← 📸 사진 일괄 변환기로 가기</a>
    
    <h2>📝 엑셀 명단 변환기</h2>
    <p class="info-subtitle">엑셀의 번호와 이름을 '이름(번호)' 형태로 자동 합성합니다.</p>
    
    <div class="input-group">
        <div class="input-box">
            <label class="step-label">엑셀 '번호' 열 복사</label>
            <textarea id="numInput" rows="8" placeholder="예)&#10;1&#10;2&#10;3"></textarea>
        </div>
        <div class="input-box">
            <label class="step-label">엑셀 '이름' 열 복사</label>
            <textarea id="nameInput" rows="8" placeholder="예)&#10;홍길동&#10;김철수&#10;이영희"></textarea>
        </div>
    </div>

    <button id="convertBtn" class="apple-btn-blue">자동 합성하기 ↓</button>
    
    <div>
        <label class="step-label">완성된 명단 (사진 변환기에 바로 붙여넣으세요)</label>
        <textarea id="resultOutput" rows="8" readonly placeholder="결과가 여기에 나타납니다."></textarea>
    </div>
    
    <br>
    <button id="copyBtn" class="apple-btn-outline">결과 복사하기</button>
</div>

<script>
    const convertBtn = document.getElementById('convertBtn');
    const copyBtn = document.getElementById('copyBtn');
    
    convertBtn.onclick = () => {
        // 입력값 가져오고 빈 줄 제거
        const nums = document.getElementById('numInput').value.split('\n').map(n => n.trim()).filter(n => n !== "");
        const names = document.getElementById('nameInput').value.split('\n').map(n => n.trim()).filter(n => n !== "");

        if (nums.length === 0 || names.length === 0) {
            alert("번호와 이름을 모두 입력해주세요!");
            return;
        }

        if (nums.length !== names.length) {
            alert(`입력된 번호 개수(${nums.length}개)와 이름 개수(${names.length}개)가 다릅니다. 확인해주세요!`);
            return;
        }

        let result = [];
        for (let i = 0; i < nums.length; i++) {
            result.push(`${names[i]}(${nums[i]})`);
        }

        document.getElementById('resultOutput').value = result.join('\n');
    };

    copyBtn.onclick = () => {
        const resultText = document.getElementById('resultOutput');
        if (resultText.value === "") {
            alert("먼저 합성하기 버튼을 눌러주세요!");
            return;
        }
        resultText.select();
        document.execCommand('copy');
        
        // 버튼 텍스트 변경 애니메이션 효과
        const originalText = copyBtn.innerText;
        copyBtn.innerText = "✓ 복사 완료!";
        copyBtn.style.backgroundColor = "#0071E3";
        copyBtn.style.color = "white";
        setTimeout(() => {
            copyBtn.innerText = originalText;
            copyBtn.style.backgroundColor = "transparent";
            copyBtn.style.color = "var(--apple-blue)";
        }, 2000);
    };
</script>
</body>
</html>
