<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엑셀 명단 변환기</title>
    <style>
        /* --- 애플 감성 테마 설정 --- */
        :root {
            --apple-bg: #F5F5F7;
            --apple-card-bg: #FFFFFF;
            --apple-text: #1D1D1F;
            --apple-text-muted: #86868B;
            --apple-blue: #0071E3;
            --apple-blue-hover: #0056A1;
            --apple-border: #C7C7CC;
            --apple-radius-lg: 18px;
            --apple-radius-md: 12px;
            --apple-radius-sm: 8px;
        }

        body { 
            background-color: var(--apple-bg); 
            color: var(--apple-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 50px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .apple-container { 
            max-width: 700px; 
            margin: 0 auto;
            background: var(--apple-card-bg); 
            padding: 40px; 
            border-radius: var(--apple-radius-lg); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        h2 { text-align: center; font-weight: 700; font-size: 2.2rem; margin-bottom: 5px; letter-spacing: -0.5px; }
        .info-subtitle { text-align: center; color: var(--apple-text-muted); font-size: 1rem; margin-bottom: 30px; }
        .step-label { font-weight: 600; font-size: 1.1rem; margin-bottom: 8px; display: block; }
        .step-desc { font-size: 0.9rem; color: var(--apple-text-muted); margin-top: -5px; margin-bottom: 15px; }
        
        .nav-btn {
            display: inline-block;
            background-color: #E8E8ED;
            color: var(--apple-text);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }
        .nav-btn:hover { background-color: #D1D1D6; }

        .mb-30 { margin-bottom: 30px; }
        
        textarea { 
            width: 100%;
            border-radius: var(--apple-radius-sm); 
            border: 1px solid var(--apple-border); 
            padding: 15px;
            font-size: 1rem;
            background-color: #FAFAFA;
            box-sizing: border-box;
            resize: vertical;
            transition: all 0.2s ease;
            line-height: 1.5;
        }
        textarea:focus {
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
            outline: none;
            background-color: #FFFFFF;
        }

        .apple-btn-blue { 
            display: block; width: 100%; background-color: var(--apple-blue); color: white; 
            border: none; border-radius: var(--apple-radius-md); padding: 16px; font-size: 1.1rem; 
            font-weight: 600; cursor: pointer; transition: all 0.2s ease; margin-bottom: 20px;
        }
        .apple-btn-blue:hover { background-color: var(--apple-blue-hover); }
        .apple-btn-blue:active { transform: scale(0.98); }

        .apple-btn-outline {
            display: block; width: 100%; background-color: transparent; color: var(--apple-blue); 
            border: 2px solid var(--apple-blue); border-radius: var(--apple-radius-md); 
            padding: 14px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .apple-btn-outline:hover { background-color: rgba(0, 113, 227, 0.05); }

        .credit-footer {
            text-align: center; margin-top: 40px; margin-bottom: 10px; font-size: 0.85rem; color: #86868B; font-weight: 500;
        }

    </style>
</head>
<body>

<div class="apple-container">
    <div class="nav-btn-group" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;">
        <a href="index.html" class="nav-btn" style="background-color: #E8E8ED; color: #1D1D1F; text-decoration: none; padding: 10px 20px; border-radius: 20px; font-weight: 600; font-size: 0.9rem;">📸 나이스 사진 변환기</a>
        <a href="converter.html" class="nav-btn" style="background-color: #E8E8ED; color: #1D1D1F; text-decoration: none; padding: 10px 20px; border-radius: 20px; font-weight: 600; font-size: 0.9rem;">📝 엑셀 명단 변환기</a>
        <a href="student_id.html" class="nav-btn" style="background-color: #E8E8ED; color: #1D1D1F; text-decoration: none; padding: 10px 20px; border-radius: 20px; font-weight: 600; font-size: 0.9rem;">🪪 학생증 용 변환기</a>
    </div>
    
    <h2>📝 엑셀 명단 변환기</h2>
    <p class="info-subtitle">엑셀의 번호와 이름 열을 통째로 복사해 '이름(번호)' 형태로 한 번에 합성합니다.</p>
    
    <div class="mb-30">
        <label class="step-label">1. 엑셀 명단 통째로 복사/붙여넣기</label>
        <p class="step-desc">번호와 이름 두 열을 한꺼번에 드래그해서 복사한 후 아래에 붙여넣으세요.</p>
        <textarea id="excelInput" rows="10" placeholder="예시)&#10;1    강윤서&#10;2    곽호준&#10;3    김도훈"></textarea>
    </div>

    <button id="convertBtn" class="apple-btn-blue">자동 합성하기 ↓</button>
    
    <div class="mb-30">
        <label class="step-label">2. 완성된 명단</label>
        <p class="step-desc">아래 결과를 복사해서 '사진 변환기'에 붙여넣으시면 됩니다.</p>
        <textarea id="resultOutput" rows="8" readonly placeholder="결과가 여기에 나타납니다."></textarea>
    </div>
    
    <button id="copyBtn" class="apple-btn-outline">완성된 결과 복사하기</button>

    <div class="credit-footer">
        Designed & Developed by 배곧해솔중 지리교사 정희택 
    </div>
</div>

<script>
    const convertBtn = document.getElementById('convertBtn');
    const copyBtn = document.getElementById('copyBtn');
    
    convertBtn.onclick = () => {
        const inputText = document.getElementById('excelInput').value;
        const lines = inputText.split('\n');
        let result = [];

        if (inputText.trim() === "") {
            alert("엑셀에서 명단을 복사해서 붙여넣어 주세요!");
            return;
        }

        for (let line of lines) {
            line = line.trim();
            if (!line) continue; // 빈 줄은 건너뛰기
            
            // 엑셀에서 복사 시 열 사이는 보통 탭(\t)이나 다중 띄어쓰기로 구분됨
            // 정규식을 사용해 탭이나 띄어쓰기를 기준으로 쪼갭니다.
            const parts = line.split(/\t|\s{1,}/);
            
            // 번호와 이름이 둘 다 있는 경우만 처리
            if (parts.length >= 2) {
                const num = parts[0].trim();
                const name = parts[1].trim();
                result.push(`${name}(${num})`);
            }
        }

        if (result.length === 0) {
            alert("명단을 제대로 인식하지 못했습니다. 번호와 이름이 나란히 있는지 확인해주세요.");
            return;
        }

        document.getElementById('resultOutput').value = result.join('\n');
    };

    copyBtn.onclick = () => {
        const resultText = document.getElementById('resultOutput');
        if (resultText.value === "") {
            alert("먼저 합성하기 버튼을 눌러주세요!");
            return;
        }
        resultText.select();
        document.execCommand('copy');
        
        // 버튼 텍스트 변경 애니메이션 효과
        const originalText = copyBtn.innerText;
        copyBtn.innerText = "✓ 클립보드에 복사 완료!";
        copyBtn.style.backgroundColor = "#0071E3";
        copyBtn.style.color = "white";
        setTimeout(() => {
            copyBtn.innerText = originalText;
            copyBtn.style.backgroundColor = "transparent";
            copyBtn.style.color = "var(--apple-blue)";
        }, 2000);
    };
</script>
</body>
</html>
